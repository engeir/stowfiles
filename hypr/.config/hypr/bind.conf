# ── App launchers ────────────────────────────────────────────────────────────
# Open the terminal
bind = SUPER, Return, exec, ghostty
# Open the browser
bind = SUPER, b, exec, zen-browser
# Program launcher, desktop entries
bind = SUPER, space, exec, ~/bin/menu_run
# Program launcher, executables
bind = ALT, space, exec, fuzzel

# ── Session ───────────────────────────────────────────────────────────────────
# Reload the Hyprland config
bind = SUPER SHIFT, r, exec, hyprctl reload
# Lock the screen  (code:60 = period/dot)
bind = SUPER SHIFT, period, exec, hyprlock
# Toggle the visibility of the bar
bind = SUPER SHIFT ALT, b, exec, bash ~/.config/hypr/scripts/hide_waybar.sh

# ── Window management ─────────────────────────────────────────────────────────
# Kill focused window
bind = SUPER, q, killactive

# Focus — vim-like hjkl
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d
# Cycle through windows
bind = SUPER, Tab, cyclenext
bind = SUPER SHIFT, Tab, cyclenext, prev
# Toggle between last two focused windows
bind = SUPER, p, focusurgentorlast

# Swap windows
bind = SUPER SHIFT, h, swapwindow, l
bind = SUPER SHIFT, l, swapwindow, r
bind = SUPER SHIFT, k, swapwindow, u
bind = SUPER SHIFT, j, swapwindow, d

# Resize windows (hold and repeat)
binde = SUPER ALT, h, resizeactive, -10 0
binde = SUPER ALT, l, resizeactive,  10 0
binde = SUPER ALT, k, resizeactive, 0 -10
binde = SUPER ALT, j, resizeactive, 0  10

# Move floating windows with arrow keys
binde = SUPER, left,  moveactive, -20 0
binde = SUPER, right, moveactive,  20 0
binde = SUPER, up,    moveactive, 0 -20
binde = SUPER, down,  moveactive, 0  20

# Window state
# Toggle floating
bind = SUPER, s, togglefloating
# Fullscreen
bind = SUPER, f, fullscreen, 0
# Fake fullscreen (signals fullscreen to the app, keeps borders)
bind = SUPER SHIFT, f, fullscreen, 2
# Maximize / monocle
bind = SUPER, m, fullscreen, 1
# Pin window (always on top, visible on all workspaces — like mango's overlay)
bind = SUPER, o, pin
# Sticky / global — no true sticky in Hyprland; pin keeps window on top across workspaces
bind = SUPER, g, pin
# Minimize to special workspace
bind = SUPER, i, movetoworkspacesilent, special:minimized
# Restore minimized
bind = SUPER SHIFT, i, togglespecialworkspace, minimized

# Master layout adjustments (replaces scroller presets)
# Swap focused window with master
bind = SUPER ALT, Return, layoutmsg, swapwithmaster
# Cycle through proportions (mfact)
binde = SUPER, x, layoutmsg, mfact +0.05
binde = SUPER SHIFT, x, layoutmsg, mfact -0.05
# Fill / reset mfact to 50/50
bind = SUPER, e, exec, hyprctl keyword master:mfact 0.5

# Gap control
bind = SUPER SHIFT, i, exec, bash ~/.config/hypr/scripts/gaps.sh up
bind = SUPER SHIFT, o, exec, bash ~/.config/hypr/scripts/gaps.sh down
bind = SUPER SHIFT, u, exec, bash ~/.config/hypr/scripts/gaps.sh toggle

# ── Workspaces ────────────────────────────────────────────────────────────────
# Switch to workspace
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# Move window to workspace (follow focus)
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# Move window to workspace silently (don't follow)
bind = SUPER CTRL, 1, movetoworkspacesilent, 1
bind = SUPER CTRL, 2, movetoworkspacesilent, 2
bind = SUPER CTRL, 3, movetoworkspacesilent, 3
bind = SUPER CTRL, 4, movetoworkspacesilent, 4
bind = SUPER CTRL, 5, movetoworkspacesilent, 5
bind = SUPER CTRL, 6, movetoworkspacesilent, 6
bind = SUPER CTRL, 7, movetoworkspacesilent, 7
bind = SUPER CTRL, 8, movetoworkspacesilent, 8
bind = SUPER CTRL, 9, movetoworkspacesilent, 9

# Navigate to adjacent non-empty workspaces
bind = SUPER ALT, i, workspace, e-1
bind = SUPER ALT, o, workspace, e+1
# Move window to adjacent workspace
bind = SUPER ALT, left,  movetoworkspace, e-1
bind = SUPER ALT, right, movetoworkspace, e+1

# ── Monitors ──────────────────────────────────────────────────────────────────
# Focus monitor
bind = SUPER SHIFT ALT, i, focusmonitor, l
bind = SUPER SHIFT ALT, o, focusmonitor, r
# Move window to monitor
bind = SUPER SHIFT, up,    movewindow, mon:u
bind = SUPER SHIFT, down,  movewindow, mon:d
bind = SUPER SHIFT, left,  movewindow, mon:l
bind = SUPER SHIFT, right, movewindow, mon:r

# ── Utilities ─────────────────────────────────────────────────────────────────
# Take a screenshot (area selection → satty annotate)
bind = SUPER SHIFT CTRL ALT, p, exec, bash ~/.config/hypr/scripts/screenshot.sh
# Clipboard menu
bind = SUPER SHIFT, g, exec, bash ~/.config/hypr/scripts/clipcat-fuzzel.sh
# Password manager
bind = SUPER SHIFT, p, exec, bash ~/bin/passmenu
# Bitwarden menu
bind = SUPER SHIFT, b, exec, bash ~/bin/bwmenu
# Monitor layout helper
bind = SUPER SHIFT, d, exec, bash ~/.config/hypr/scripts/monitor.sh

# ── Brightness / Volume ───────────────────────────────────────────────────────
bind = , XF86MonBrightnessDown,     exec, bash ~/.config/hypr/scripts/brightness.sh down
bind = ALT, XF86MonBrightnessDown,  exec, bash ~/.config/hypr/scripts/brightness.sh down small
bind = , XF86MonBrightnessUp,       exec, bash ~/.config/hypr/scripts/brightness.sh up
bind = ALT, XF86MonBrightnessUp,    exec, bash ~/.config/hypr/scripts/brightness.sh up small
bind = , XF86AudioLowerVolume,      exec, bash ~/.config/hypr/scripts/volume.sh down
bind = , XF86AudioRaiseVolume,      exec, bash ~/.config/hypr/scripts/volume.sh up
bind = , XF86AudioMute,             exec, bash ~/.config/hypr/scripts/volume.sh mute

# Media controls
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# ── Lid switch ────────────────────────────────────────────────────────────────
bindl = , switch:on:Lid Switch,  exec, bash ~/.config/hypr/scripts/idle.sh --lid-down
bindl = , switch:off:Lid Switch, exec, bash ~/.config/hypr/scripts/idle.sh --lid-up

# ── Mouse ─────────────────────────────────────────────────────────────────────
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
