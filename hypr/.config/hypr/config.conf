# General layout and border colors
# Palette: beige=#c9b890  orange=#DA7510  green=#89aa61  root=#201b14  urgent=#ad401f
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 3
    col.active_border = rgb(c9b890)
    col.inactive_border = rgb(444444)
    layout = master
}

# Decoration: blur, shadows, rounding, opacity
decoration {
    rounding = 2
    active_opacity = 0.95
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 5
        passes = 2
        noise = 0.02
        brightness = 0.9
        contrast = 0.9
        vibrancy = 0.2
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000066)
    }
}

# Animations — zoom open, slide close (mirrors mango)
animations {
    enabled = true

    bezier = easeOut,  0.16, 1,    0.3,  1
    bezier = overshoot, 0.46, 1.0, 0.29, 1.1
    bezier = slideOut, 0.08, 0.92, 0,    1

    # Windows
    animation = windows,    1, 2,   overshoot, popin 70%
    animation = windowsOut, 1, 3,   slideOut,  slide
    animation = windowsMove,1, 2,   easeOut

    # Layers (bars, launchers)
    animation = layers,     1, 2,   easeOut,   slide

    # Workspaces
    animation = workspaces, 1, 1.5, easeOut,   slide

    # Fade
    animation = fade,       1, 2,   easeOut
    animation = fadeOut,    1, 3,   slideOut
}

# Master layout — mirrors mango's master-stack
master {
    new_status = slave
    mfact = 0.5
    orientation = left
    allow_small_split = true
    smart_resizing = true
}

# Input — matches mango exactly
input {
    kb_layout = no,gb
    kb_options = grp:win_space_toggle
    numlock_by_default = true
    repeat_rate = 50
    repeat_delay = 200
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        tap-to-click = true
        tap-and-drag = true     # required for drag_3fg to work
        drag_lock = 1           # lifted finger won't drop drag (with timeout)
        drag_3fg = 1            # 3-finger drag
        natural_scroll = false
        disable_while_typing = true
    }
}

misc {
    vfr = true
    vrr = 2
    mouse_move_enables_dpms = true
    focus_on_activate = true
    disable_hyprland_logo = true
}
