# ── Floating ──────────────────────────────────────────────────────────────────
windowrule = float on, match:title ^Open Local Repository$
windowrule = float on, match:title ^Open File$
windowrule = float on, match:title ^Select File$

# Fake fullscreen: app reports fullscreen but window stays normal-sized
windowrule = fullscreen_state 0 2, match:title ^Spotify

windowrule = float on, match:class ^(thunar)$
windowrule = size 800 900, match:class ^(thunar)$

windowrule = float on, match:title ^Translate$
windowrule = size 800 900, match:title ^Translate$

windowrule = float on, match:class ^(blueman-manager)$
windowrule = size 1500 900, match:class ^(blueman-manager)$

windowrule = float on, match:class ^(yesplaymusic)$
windowrule = size 1500 900, match:class ^(yesplaymusic)$

windowrule = float on, match:class ^(clash-verge)$
windowrule = size 1500 900, match:class ^(clash-verge)$

windowrule = float on, match:class ^(pot)$, match:title ^Recognize$
windowrule = size 1500 900, match:class ^(pot)$, match:title ^Recognize$

windowrule = float on, match:class ^(mew)$
windowrule = float on, match:class ^(dmenu)$
windowrule = float on, match:class ^(xfce-polkit)$

windowrule = float on, match:title ^Image Viewer$
windowrule = float on, match:title ^Image View$
windowrule = float on, match:title ^Preview$

# ── No border ─────────────────────────────────────────────────────────────────
windowrule = border_size 0, match:class ^(Rofi)$

# ── Workspace assignment ──────────────────────────────────────────────────────
windowrule = workspace 3, match:class ^(QQ)$
windowrule = workspace 4, match:class ^(Google-chrome)$
windowrule = workspace 4, match:class ^(zen-beta)$
windowrule = workspace 5 silent, match:class ^(org.telegram.desktop)$
windowrule = workspace 6, match:class ^(com.obsproject.Studio)$
windowrule = workspace 7, match:class ^(Proton Mail)$
windowrule = workspace 7, match:class ^(signal)$

# ── Pinned overlays ───────────────────────────────────────────────────────────
windowrule = float on, match:class ^(bongo-cat)$, match:title ^BongoCat$
windowrule = pin on, match:class ^(bongo-cat)$, match:title ^BongoCat$
windowrule = border_size 0, match:class ^(bongo-cat)$, match:title ^BongoCat$
windowrule = size 400 400, match:class ^(bongo-cat)$

windowrule = float on, match:class ^(mpv)$, match:title ^video0 - mpv$
windowrule = pin on, match:class ^(mpv)$, match:title ^video0 - mpv$
windowrule = size 280 200, match:class ^(mpv)$, match:title ^video0 - mpv$

# Satty screenshot overlay (no animation compositing delay)
windowrule = float on, match:class ^(com.gabm.satty)$
windowrule = pin on, match:class ^(com.gabm.satty)$

# ── Opacity overrides ─────────────────────────────────────────────────────────
# These apps should always be fully opaque (ignore global opacity settings)
windowrule = opacity 1.0 override 1.0 override, match:class ^(mpv)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(Google-chrome)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(QQ)$

# ── Animation overrides ───────────────────────────────────────────────────────
# Flameshot: no animation, immediate fullscreen
windowrule = no_anim on, match:class ^(flameshot)$
windowrule = fullscreen on, match:class ^(flameshot)$
windowrule = float on, match:class ^(flameshot)$
windowrule = monitor 0, match:class ^(flameshot)$

# Image viewers: zoom open animation
windowrule = animation popin, match:title ^Image Viewer$
windowrule = animation popin, match:title ^Image View$

# ── Layer rules ───────────────────────────────────────────────────────────────
layerrule = no_anim on, match:namespace ^selection$
layerrule = no_anim on, match:namespace ^dimland_layer$
layerrule = no_anim on, match:namespace ^hyprpicker$
layerrule = no_anim on, match:namespace ^showkeys$
layerrule = no_anim on, match:namespace ^wofi$
layerrule = no_anim on, match:namespace ^swayosd$
layerrule = blur on, match:namespace ^swaync-control-center$
layerrule = blur on, match:namespace ^swaync-notification-window$
