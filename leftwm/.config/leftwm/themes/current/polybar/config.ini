[colors]
bg      = #201b14
fg      = #D1B88E
orange  = #DA7510
red     = #ad401f
grey    = #444444
dim     = #c9b890
occupied = #2a2318

[bar/main]
monitor           = ${env:MONITOR:}
width             = 100%
height            = 24
offset-x          = 0
offset-y          = 0
radius            = 0
fixed-center      = true
background        = ${colors.bg}
foreground        = ${colors.fg}
padding-left      = 1
padding-right     = 1
module-margin-left  = 0
module-margin-right = 1
font-0            = CaskaydiaMono Nerd Font Bold:size=10;2
separator         = " "
tray-position     = right
tray-padding      = 4
modules-left      = workspaces
modules-center    = layout
modules-right     = volume battery date

[module/workspaces]
type    = custom/script
exec    = MONITOR_IDX=${env:MONITOR_IDX:0} $HOME/.config/leftwm/themes/current/scripts/workspaces.sh
tail    = true
label   = %output%

[module/layout]
type              = custom/script
exec              = MONITOR_IDX=${env:MONITOR_IDX:0} $HOME/.config/leftwm/themes/current/scripts/layout.sh
tail              = true
label             = %output%
label-foreground  = ${colors.orange}

[module/volume]
type     = custom/script
exec     = $HOME/.config/leftwm/themes/current/scripts/volume_bar.sh
interval = 2

[module/battery]
type     = custom/script
exec     = $HOME/.config/leftwm/themes/current/scripts/battery.sh
interval = 60

[module/date]
type              = internal/date
interval          = 30
date              = %a %d %b
time              = %H:%M
label             =  %date%  %time%
label-foreground  = ${colors.fg}
