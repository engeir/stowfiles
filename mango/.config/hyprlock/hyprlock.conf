# hyprlock config for mangowm
# Palette: beige=#c9b890  orange=#DA7510  green=#89aa61  root=#201b14

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = $HOME/.cache/wallpaper/wallpaper.jpg
    color = rgb(32,27,20)

    blur_size = 3
    blur_passes = 2
    noise = 0.0117
    contrast = 1.2
    brightness = 0.75
    vibrancy = 0.18
    vibrancy_darkness = 0.0
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>"
    color = rgba(201, 184, 144, 0.9)
    font_size = 16
    font_family = Victor Mono Bold Italic
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.2
    position = 0, -100
    halign = center
    valign = center
}

# Hour-Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = rgba(201, 184, 144, 0.95)
    font_size = 200
    font_family = JetBrainsMono Nerd Font ExtraBold
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.9)
    shadow_boost = 1.2
    position = 0, -60
    halign = center
    valign = top
}

# Minute-Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = rgba(218, 117, 16, 0.9)
    font_size = 200
    font_family = JetBrainsMono Nerd Font ExtraBold
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.9)
    shadow_boost = 1.2
    position = 0, -320
    halign = center
    valign = top
}

# Seconds-Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%S")"
    color = rgba(137, 170, 97, 0.9)
    font_size = 35
    font_family = JetBrainsMono Nerd Font ExtraBold
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.2
    position = 0, -350
    halign = center
    valign = top
}

# Wallpaper as avatar
image {
    monitor =
    path = $HOME/stowfiles/assets/favicon_8x8_padded.png
    size = 160
    rounding = -1
    border_size = 2
    border_color = rgba(218, 117, 16, 0.6)
    rotate = 0
    reload_time = -1
    position = 0, 220
    halign = center
    valign = bottom
}

# USER
label {
    monitor =
    text =   $USER
    color = rgba(201, 184, 144, 0.9)
    font_size = 24
    font_family = Victor Mono Bold Oblique
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.2
    position = 0, 150
    halign = center
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(218, 117, 16, 0.8)
    inner_color = rgba(32, 27, 20, 0.6)
    capslock_color = rgb(255,255,255)
    font_color = rgba(201, 184, 144, 1.0)
    fade_on_empty = false
    font_family = Victor Mono Bold Oblique
    placeholder_text = <i><span foreground="##ffffff99"> Type Password</span></i>
    hide_input = false
    position = 0, 50
    halign = center
    valign = bottom
}

# uptime
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p)" </b>"
    color = rgba(201, 184, 144, 0.75)
    font_size = 16
    font_family = Victor Mono Bold Oblique
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.2
    position = 0, 20
    halign = right
    valign = bottom
}

# weather — calls script to refresh cache, then reads formatted output
label {
    monitor =
    text = cmd[update:3600000] bash $HOME/.config/hypr/scripts/weather.sh > /dev/null 2>&1; cat "$HOME/.cache/.weather_cache"
    color = rgba(201, 184, 144, 0.85)
    font_size = 18
    font_family = Victor Mono Bold Oblique
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.2
    position = 50, 20
    halign = left
    valign = bottom
}
